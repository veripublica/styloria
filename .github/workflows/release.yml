name: Release

# styloria is a library crate (no binaries to attach), so a release is just a
# GitHub Release whose body is this version's CHANGELOG.md section — extracted
# automatically, so the notes never have to be filled in by hand. Publishing to
# crates.io is done separately (`cargo publish`); this only creates the Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Populate the GitHub Release body from this version's CHANGELOG.md
      # section, so the release notes never have to be filled in by hand.
      # A missing section yields empty notes — the release still publishes, so
      # confirm the CHANGELOG has a `## [x.y.z]` heading before tagging.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          ver="${tag#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" {inblk=1; next}
            inblk && /^## \[/ {exit}
            inblk { if (!started && $0 ~ /^[[:space:]]*$/) next; started=1; buf[n++]=$0 }
            END { last=n-1; while (last>=0 && buf[last] ~ /^[[:space:]]*$/) last--; for (i=0;i<=last;i++) print buf[i] }
          ' CHANGELOG.md > RELEASE_NOTES.md
          printf '\n\nFull notes: [CHANGELOG.md](https://github.com/veripublica/styloria/blob/main/CHANGELOG.md). Also on [crates.io](https://crates.io/crates/styloria/%s).\n' "$ver" >> RELEASE_NOTES.md
          echo "----- extracted release notes -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
